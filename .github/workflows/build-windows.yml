name: Build Windows Installer

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Package Windows installer (electron-builder)
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject installer into web static assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path public/downloads
          Copy-Item -Path "release/SAPPHIRE.RESTAURANT.POS.Setup.0.0.0.exe" -Destination "public/downloads/SAPPHIRE.RESTAURANT.POS.Setup.0.0.0.exe" -Force
          Write-Host "Installer copied to public/downloads/"

      - name: Build web assets (Vite)
        run: npm run build

      - name: Upload web bundle (includes installer)
        uses: actions/upload-artifact@v4
        with:
          name: web-bundle-with-installer
          path: dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-beta
          name: SAPPHIRE RESTAURANT POS v1.0.0-beta
          files: release/*.exe
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}